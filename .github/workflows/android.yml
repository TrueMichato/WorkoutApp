name: Android CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  host-validation:
    name: Unit, lint, assemble
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run host validation
        run: ./gradlew --no-daemon --console=plain :app:testDebugUnitTest :app:compileDebugAndroidTestKotlin :app:lintDebug :app:assembleDebug

      - name: Upload host reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: host-validation-reports
          path: |
            app/build/reports/**
            app/build/test-results/**
          if-no-files-found: ignore

  connected-smoke:
    name: Connected smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connected smoke tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: ./gradlew --no-daemon --console=plain :app:connectedDebugAndroidTest

      - name: Upload connected reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: connected-smoke-reports
          path: |
            app/build/reports/androidTests/**
            app/build/outputs/androidTest-results/**
          if-no-files-found: ignore
